<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>قائمة الطعام - مطعم جُحى</title>
    <script src="./assets/js/tailwind.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { primary: "#E63946", secondary: "#457B9D" },
            borderRadius: {
              none: "0px",
              sm: "4px",
              DEFAULT: "8px",
              md: "12px",
              lg: "16px",
              xl: "20px",
              "2xl": "24px",
              "3xl": "32px",
              full: "9999px",
              button: "8px",
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./assets/css/remixicon.css" />
    <style>
      body {
        font-family: "Tajawal", sans-serif;
      }
      .badge {
        position: absolute;
        top: -5px;
        left: -5px;
        min-width: 18px;
        height: 18px;
        font-size: 10px;
      }
      .category-tab.active {
        background-color: #e63946;
        color: white;
      }
    </style>
  </head>
  <body class="bg-gray-50 pb-20">
    <!-- Header -->
    <header class="fixed top-0 w-full bg-white shadow-md z-50">
      <div class="flex items-center justify-between px-4 py-3">
        <a href="index.html" class="w-10 h-10 flex items-center justify-center"><i class="ri-arrow-right-s-line ri-lg text-gray-700"></i></a>
        <div class="text-lg font-bold">قائمة الطعام</div>
        <div class="w-10 h-10 flex items-center justify-center relative cursor-pointer" id="cartButton">
          <i class="ri-shopping-cart-2-line ri-lg text-gray-700"></i>
          <span class="badge bg-primary text-white rounded-full flex items-center justify-center" id="cartBadge">٠</span>
        </div>
      </div>
      <!-- Search Bar -->
      <div class="px-4 py-2 border-t border-gray-100">
        <div class="relative">
          <input type="text" id="searchInput" placeholder="ابحث عن طبقك المفضل..." class="w-full py-2 px-4 pr-10 bg-gray-100 rounded-button border-none text-sm focus:outline-none focus:ring-2 focus:ring-primary/20" />
          <div class="absolute left-3 top-1/2 transform -translate-y-1/2 w-6 h-6 flex items-center justify-center"><i class="ri-search-line text-gray-500"></i></div>
        </div>
      </div>
    </header>
    <!-- Categories Filter -->
    <div class="sticky top-[125px] bg-white z-40 shadow-sm mt-[105px]">
      <div class="overflow-x-auto py-2 px-4">
        <div class="flex space-x-2 space-x-reverse min-w-max">
          <button class="category-tab active px-4 py-2 rounded-full text-sm font-medium transition-colors" data-category="all">الكل</button>
          <button class="category-tab px-4 py-2 rounded-full text-sm font-medium bg-gray-100 transition-colors" data-category="grills">مشاوي</button>
          <button class="category-tab px-4 py-2 rounded-full text-sm font-medium bg-gray-100 transition-colors" data-category="appetizers">مقبلات</button>
          <button class="category-tab px-4 py-2 rounded-full text-sm font-medium bg-gray-100 transition-colors" data-category="sandwiches">سندويشات</button>
          <button class="category-tab px-4 py-2 rounded-full text-sm font-medium bg-gray-100 transition-colors" data-category="desserts">حلويات</button>
          <button class="category-tab px-4 py-2 rounded-full text-sm font-medium bg-gray-100 transition-colors" data-category="drinks">مشروبات</button>
          <button class="category-tab px-4 py-2 rounded-full text-sm font-medium bg-gray-100 transition-colors" data-category="rice">أرز</button>
        </div>
      </div>
    </div>
    <!-- Main Content -->
    <main class="pt-4 pb-4 px-4 ">
      <div id="menuItemsContainer" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
        <!-- الأطباق تملأ تلقائياً من js/menu-page.js -->
      </div>
      <div id="emptyState" class="hidden flex flex-col items-center justify-center py-16">
        <div class="w-24 h-24 mb-4 flex items-center justify-center"><i class="ri-search-line ri-3x text-gray-300"></i></div>
        <h3 class="text-lg font-medium text-gray-700 mb-2">لا توجد منتجات</h3>
        <p class="text-sm text-gray-500 text-center">لم نتمكن من العثور على منتجات تطابق بحثك. حاول استخدام كلمات مختلفة.</p>
      </div>
    </main>
    <!-- Tab Bar -->
    <nav class="fixed bottom-0 w-full bg-white shadow-[0_-2px_10px_rgba(0,0,0,0.1)] z-50 md:hidden">
      <div class="grid grid-cols-4">
        <a href="index.html" class="flex flex-col items-center py-2 cursor-pointer">
          <div class="w-6 h-6 flex items-center justify-center"><i class="ri-home-5-line text-gray-500"></i></div>
          <span class="text-xs mt-1 text-gray-500">الرئيسية</span>
        </a>
        <div class="flex flex-col items-center py-2 cursor-pointer">
          <div class="w-6 h-6 flex items-center justify-center"><i class="ri-restaurant-line text-primary"></i></div>
          <span class="text-xs mt-1 text-primary">القائمة</span>
        </div>
        <div class="flex flex-col items-center py-2 cursor-pointer">
          <div class="w-6 h-6 flex items-center justify-center"><i class="ri-shopping-bag-line text-gray-500"></i></div>
          <span class="text-xs mt-1 text-gray-500">طلباتي</span>
        </div>
        <div class="flex flex-col items-center py-2 cursor-pointer">
          <div class="w-6 h-6 flex items-center justify-center"><i class="ri-user-line text-gray-500"></i></div>
          <span class="text-xs mt-1 text-gray-500">حسابي</span>
        </div>
      </div>
    </nav>
    <!-- Cart Modal -->
    <div id="cartModal" class="fixed inset-0 bg-black/50 z-[60] hidden">
      <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-xl max-h-[80vh] overflow-y-auto">
        <div class="sticky top-0 bg-white p-4 border-b flex justify-between items-center">
          <h2 class="text-lg font-bold">سلة الطلبات</h2>
          <div class="w-8 h-8 flex items-center justify-center cursor-pointer" id="closeCart" aria-label="إغلاق السلة">
            <i class="ri-close-line ri-lg"></i>
          </div>
        </div>
        <div class="p-4">
          <div id="cartItems" class="space-y-4"></div>
          <div id="cartSummary" class="mt-6 space-y-2 hidden">
            <div class="flex justify-between text-sm">
              <span>المجموع</span>
              <span id="cartSubtotal">٠ ر.س</span>
            </div>
            <div class="flex justify-between text-sm">
              <span>رسوم التوصيل</span>
              <span id="cartDelivery">١٠ ر.س</span>
            </div>
            <div class="flex justify-between font-bold pt-2 border-t">
              <span>الإجمالي</span>
              <span id="cartTotal">٠ ر.س</span>
            </div>
          </div>
          <div class="mt-6">
            <button id="checkoutBtn" class="w-full bg-primary text-white py-3 rounded-button font-medium cursor-pointer hidden">إتمام الطلب</button>
          </div>
        </div>
      </div>
    </div>
    <div id="notification" class="fixed top-16 left-1/2 transform -translate-x-1/2 bg-green-500 text-white px-4 py-2 rounded-lg shadow-lg z-50 hidden"></div>
    <script src="./assets/js/cart.js"></script>
    <script src="./assets/js/menu-page.js"></script>
  </body>
</html>
