<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>حسابي - مطعم جُحى</title>
    <script src="./assets/js/tailwind.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { primary: "#E63946", secondary: "#457B9D" },
            borderRadius: {
              none: "0px",
              sm: "4px",
              DEFAULT: "8px",
              md: "12px",
              lg: "16px",
              xl: "20px",
              "2xl": "24px",
              "3xl": "32px",
              full: "9999px",
              button: "8px",
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./assets/css/remixicon.css" />
    <style>
      body {
        font-family: "Tajawal", sans-serif;
      }
      .badge {
        position: absolute;
        top: -5px;
        left: -5px;
        min-width: 18px;
        height: 18px;
        font-size: 10px;
      }
      .icon-bg {
        background: linear-gradient(135deg, #e63946 60%, #457b9d 100%);
      }
      input[readonly] {
        background: #f3f4f6 !important;
        color: #888;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body class="bg-gray-50 pb-20">
    <!-- Header -->
    <header class="fixed top-0 w-full bg-white shadow-md z-50">
      <div class="flex items-center justify-between px-4 py-3">
        <a href="index.html" class="w-10 h-10 flex items-center justify-center">
          <i class="ri-arrow-right-s-line ri-lg text-gray-700"></i>
        </a>
        <div class="text-lg font-bold">حسابي</div>
        <div class="w-10 h-10 flex items-center justify-center relative cursor-pointer" id="cartButton">
          <i class="ri-shopping-cart-2-line ri-lg text-gray-700"></i>
          <span class="badge bg-primary text-white rounded-full flex items-center justify-center" id="cartBadge">٠</span>
        </div>
      </div>
    </header>
    <!-- Main Content -->
    <main class="pt-24 pb-8 px-4 max-w-xl mx-auto">
      <div class="flex flex-col items-center mb-8">
        <div class="icon-bg w-24 h-24 rounded-full flex items-center justify-center shadow-lg mb-3">
          <i class="ri-user-3-line text-white text-5xl"></i>
        </div>
        <div id="userName" class="text-xl font-bold text-primary mb-1">اسم المستخدم</div>
        <div id="userEmail" class="text-sm text-gray-500">user@email.com</div>
      </div>
      <form id="accountForm" class="bg-white rounded-lg shadow-md p-6 space-y-5">
        <h2 class="text-lg font-bold mb-2 text-primary">معلومات الحساب</h2>
        <div>
          <label class="block mb-1 text-sm font-medium text-gray-700">الاسم الكامل</label>
          <input id="inputName" type="text" class="w-full bg-gray-100 rounded-button border px-3 py-2 text-sm focus:outline-primary" required />
        </div>
        <div>
          <label class="block mb-1 text-sm font-medium text-gray-700">البريد الإلكتروني</label>
          <input id="inputEmail" type="email" class="w-full bg-gray-100 rounded-button border px-3 py-2 text-sm focus:outline-primary" required readonly />
        </div>
        <div>
          <label class="block mb-1 text-sm font-medium text-gray-700">رقم الجوال</label>
          <input id="inputPhone" type="tel" class="w-full bg-gray-100 rounded-button border px-3 py-2 text-sm focus:outline-primary" required />
        </div>
        <div>
          <label class="block mb-1 text-sm font-medium text-gray-700">العنوان الافتراضي</label>
          <input id="inputAddress" type="text" class="w-full bg-gray-100 rounded-button border px-3 py-2 text-sm focus:outline-primary" required />
        </div>
        <button type="submit" class="w-full bg-primary text-white py-2 rounded-button font-medium shadow hover:bg-primary/90 transition">حفظ التغييرات</button>
      </form>
      <div class="bg-white rounded-lg shadow-md p-6 mt-8">
        <h2 class="text-lg font-bold mb-2 text-primary">إجراءات الحساب</h2>
        <button id="logoutBtn" class="w-full bg-gray-100 text-primary border border-primary font-medium rounded-button py-2 hover:bg-red-50 hover:text-red-700 mt-2 transition">تسجيل الخروج</button>
        <button id="deleteBtn" class="w-full bg-red-100 text-red-700 font-medium rounded-button py-2 mt-3 hover:bg-red-200 transition">حذف الحساب</button>
      </div>
    </main>
    <!-- Tab Bar -->
    <nav class="fixed bottom-0 w-full bg-white shadow-[0_-2px_10px_rgba(0,0,0,0.1)] z-50 md:hidden">
      <div class="grid grid-cols-4">
        <a href="index.html" class="flex flex-col items-center py-2 cursor-pointer">
          <div class="w-6 h-6 flex items-center justify-center"><i class="ri-home-5-line text-gray-500"></i></div>
          <span class="text-xs mt-1 text-gray-500">الرئيسية</span>
        </a>
        <a href="restaurant-menu.html" class="flex flex-col items-center py-2 cursor-pointer">
          <div class="w-6 h-6 flex items-center justify-center"><i class="ri-restaurant-line text-gray-500"></i></div>
          <span class="text-xs mt-1 text-gray-500">القائمة</span>
        </a>
        <a href="orders.html" class="flex flex-col items-center py-2 cursor-pointer">
          <div class="w-6 h-6 flex items-center justify-center"><i class="ri-shopping-bag-line text-gray-500"></i></div>
          <span class="text-xs mt-1 text-gray-500">طلباتي</span>
        </a>
        <div class="flex flex-col items-center py-2 cursor-pointer">
          <div class="w-6 h-6 flex items-center justify-center"><i class="ri-user-line text-primary"></i></div>
          <span class="text-xs mt-1 text-primary">حسابي</span>
        </div>
      </div>
    </nav>
    <!-- Cart Modal -->
    <div id="cartModal" class="fixed inset-0 bg-black/50 z-[60] hidden">
      <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-xl max-h-[80vh] overflow-y-auto">
        <div class="sticky top-0 bg-white p-4 border-b flex justify-between items-center">
          <h2 class="text-lg font-bold">سلة الطلبات</h2>
          <div class="w-8 h-8 flex items-center justify-center cursor-pointer" id="closeCart" aria-label="إغلاق السلة">
            <i class="ri-close-line ri-lg"></i>
          </div>
        </div>
        <div class="p-4">
          <div id="cartItems" class="space-y-4"></div>
          <div id="cartSummary" class="mt-6 space-y-2 hidden">
            <div class="flex justify-between text-sm">
              <span>المجموع</span>
              <span id="cartSubtotal">٠ ر.س</span>
            </div>
            <div class="flex justify-between text-sm">
              <span>رسوم التوصيل</span>
              <span id="cartDelivery">١٠ ر.س</span>
            </div>
            <div class="flex justify-between font-bold pt-2 border-t">
              <span>الإجمالي</span>
              <span id="cartTotal">٠ ر.س</span>
            </div>
          </div>
          <div class="mt-6">
            <button id="checkoutBtn" class="w-full bg-primary text-white py-3 rounded-button font-medium cursor-pointer hidden">إتمام الطلب</button>
          </div>
        </div>
      </div>
    </div>
    <div id="notification" class="fixed top-16 left-1/2 transform -translate-x-1/2 bg-green-500 text-white px-4 py-2 rounded-lg shadow-lg z-50 hidden"></div>
    <script src="./assets/js/cart.js"></script>
    <script>
      // بيانات المستخدم الوهمية (يفضل ربطها مع قاعدة بيانات لاحقًا)
      function getUser() {
        return JSON.parse(localStorage.getItem("user") || JSON.stringify({
          name: "نادر وضاح",
          email: "user@email.com",
          phone: "0550001122",
          address: "المدينة المنورة - حي النور"
        }));
      }
      function saveUser(user) {
        localStorage.setItem("user", JSON.stringify(user));
      }
      function renderUser() {
        const user = getUser();
        document.getElementById("userName").textContent = user.name;
        document.getElementById("userEmail").textContent = user.email;
        document.getElementById("inputName").value = user.name;
        document.getElementById("inputEmail").value = user.email;
        document.getElementById("inputPhone").value = user.phone;
        document.getElementById("inputAddress").value = user.address;
      }
      document.addEventListener("DOMContentLoaded", function () {
        renderUser();
        // حفظ التعديلات
        document.getElementById("accountForm").addEventListener("submit", function(e){
          e.preventDefault();
          const user = {
            name: document.getElementById("inputName").value.trim(),
            email: document.getElementById("inputEmail").value.trim(),
            phone: document.getElementById("inputPhone").value.trim(),
            address: document.getElementById("inputAddress").value.trim(),
          };
          saveUser(user);
          renderUser();
          const notification = document.getElementById("notification");
          notification.textContent = "تم حفظ بياناتك بنجاح";
          notification.classList.remove("hidden");
          setTimeout(() => notification.classList.add("hidden"), 1500);
        });
        // تسجيل الخروج
        document.getElementById("logoutBtn").addEventListener("click", function(){
          localStorage.removeItem("user");
          window.location.href = "index.html";
        });
        // حذف الحساب
        document.getElementById("deleteBtn").addEventListener("click", function(){
          if(confirm("هل أنت متأكد أنك تريد حذف حسابك؟ سيتم حذف جميع بياناتك!")) {
            localStorage.removeItem("user");
            localStorage.removeItem("cart");
            localStorage.removeItem("orders");
            window.location.href = "index.html";
          }
        });
      });
    </script>
  </body>
</html>
