<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="theme-color" content="#E87D0C">
    <title>ليالي أبهى | المأكولات الشعبية الأصيلة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --color-primary: #E87D0C;
            --color-primary-dark: #C46A00;
            --color-primary-light: #FFF3E0;
            --color-primary-lighter: #FFF8F0;
            --color-bg: #FFF8F0;
            --color-surface: #FFFFFF;
            --color-border: #F0E0CC;
            --color-text-primary: #1A1A1A;
            --color-text-secondary: #6B6560;
            --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
            --radius-lg: 16px;
        }
        body { font-family: 'Tajawal', sans-serif; background: var(--color-bg); color: var(--color-text-primary); padding-bottom: 80px; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--color-bg); }
        ::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 3px; }
        .dish-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .dish-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); border-color: var(--color-primary); }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.15s;
            min-height: 44px;
        }
        .btn-primary { background: var(--color-primary); color: white; }
        .btn-primary:hover { background: var(--color-primary-dark); }
        .btn-secondary { background: var(--color-primary-light); color: var(--color-primary); }
        .btn-sm { padding: 8px 16px; font-size: 0.875rem; }
        .btn-block { width: 100%; }
        .category-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            border-radius: 30px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            color: var(--color-text-secondary);
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .category-btn.active { background: var(--color-primary); color: white; border-color: var(--color-primary); }
        .cart-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--color-primary);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
        }
        .cart-drawer { display: none; position: fixed; inset: 0; z-index: 50; }
        .cart-drawer.open { display: block; }
        .cart-drawer__panel {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 100%;
            max-width: 420px;
            background: var(--color-surface);
            box-shadow: 0 0 30px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            animation: slideRight 0.3s ease;
        }
        @keyframes slideRight { from { transform: translateX(-100%); } to { transform: translateX(0); } }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
        }
        .cart-item {
            display: flex;
            gap: 12px;
            padding: 14px;
            background: var(--color-primary-lighter);
            border-radius: 12px;
            margin-bottom: 10px;
        }
        .qty-control {
            display: inline-flex;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            overflow: hidden;
        }
        .qty-control button {
            width: 32px;
            height: 32px;
            background: white;
            border: none;
            cursor: pointer;
        }
        .toast-container {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            padding: 12px 20px;
            border-radius: 12px;
            background: #1A1A1A;
            color: white;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: auto;
            animation: fadeIn 0.2s;
        }
        .toast-success { background: #2E7D32; }
        .toast-error { background: #C62828; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .price { color: var(--color-primary); font-weight: 700; }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .hidden { display: none !important; }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid var(--color-border);
            padding: 8px 0;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            z-index: 30;
            display: flex;
            justify-content: space-around;
        }
        .bottom-nav button {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--color-text-muted);
            font-size: 12px;
        }
        .bottom-nav button i { font-size: 20px; margin-bottom: 2px; }
        @media (min-width: 768px) { .bottom-nav { display: none; } body { padding-bottom: 0; } }
        .search-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid var(--color-border);
            border-radius: 32px;
            background: white;
            font-size: 1rem;
        }
        .search-input:focus { border-color: var(--color-primary); outline: none; }
        .empty-state { text-align: center; padding: 48px 24px; }
        .badge-tag {
            display: inline-flex;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-popular { background: var(--color-primary); color: white; }
        .location-input-group { display: flex; gap: 12px; align-items: center; margin-top: 12px; }
        .location-input-group input { flex: 1; padding: 12px; border: 1px solid var(--color-border); border-radius: 12px; font-family: inherit; }
        .share-location-btn { background: var(--color-primary-light); padding: 12px; border-radius: 12px; cursor: pointer; text-align: center; color: var(--color-primary); font-weight: 500; }
        .loading-spinner { display: flex; justify-content: center; align-items: center; min-height: 300px; font-size: 1.2rem; color: var(--color-primary); gap: 10px; }
    </style>
</head>
<body>

<div id="toastContainer" class="toast-container"></div>

<!-- Header -->
<header class="fixed top-0 left-0 right-0 z-30 bg-white/95 backdrop-blur-md border-b border-[var(--color-border)]">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-11 h-11 rounded-full shadow-md overflow-hidden">
                <img src="./assets/imges/logo.jpg" alt="شعار ليالي أبهى" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/44x44?text=🍽️'">
            </div>
            <div>
                <h1 class="text-xl font-black text-[var(--color-primary-dark)]">ليالي أبهى</h1>
                <p class="text-xs text-[var(--color-text-muted)]">للمأكولات الشعبية</p>
            </div>
        </div>
        <button onclick="App.toggleCart()" class="relative p-2 rounded-full hover:bg-[var(--color-primary-light)]">
            <i class="fas fa-shopping-bag text-xl"></i>
            <span id="cartBadge" class="cart-badge hidden">0</span>
        </button>
    </div>
</header>

<main class="max-w-6xl mx-auto px-4 pt-[72px]">
    <!-- Hero Banner -->
    <section class="mt-4 mb-8">
        <div class="relative rounded-2xl overflow-hidden shadow-lg h-[200px] md:h-[260px]">
            <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=1200&h=500&fit=crop" alt="مطعم ليالي أبهى" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent flex flex-col justify-end p-6">
                <span class="badge-tag badge-popular w-fit mb-2"><i class="fas fa-star"></i> 4.9 تقييم</span>
                <h2 class="text-2xl md:text-3xl font-bold text-white">أهلاً بك في ليالي أبهى</h2>
                <p class="text-white/80 text-sm">أشهى المأكولات الشعبية – مضغوط، فطور، معصوب، مطبق و غيرها</p>
            </div>
        </div>
        <div class="flex flex-wrap gap-3 justify-center mt-5">
            <div class="bg-white px-4 py-2 rounded-full shadow-sm border"><i class="fas fa-utensils text-[var(--color-primary)] ml-1"></i> 70+ طبق</div>
            <div class="bg-white px-4 py-2 rounded-full shadow-sm border"><i class="fas fa-truck text-[var(--color-primary)] ml-1"></i> توصيل سريع</div>
            <div class="bg-white px-4 py-2 rounded-full shadow-sm border"><i class="fas fa-store text-[var(--color-primary)] ml-1"></i> استلام فوري</div>
        </div>
    </section>

    <!-- Search -->
    <section class="mb-5 relative">
        <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن طبق... مضغوط، معصوب، مطبق، شاي...">
        <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-400"></i>
        <button id="searchClear" class="absolute left-14 top-1/2 -translate-y-1/2 w-6 h-6 rounded-full bg-gray-200 hidden items-center justify-center" onclick="App.clearSearch()"><i class="fas fa-times text-[10px]"></i></button>
    </section>

    <!-- Categories -->
    <section class="mb-6">
        <div class="flex items-center gap-2 mb-3"><i class="fas fa-th-large text-[var(--color-primary)]"></i><h3 class="font-bold">الأقسام الرئيسية</h3></div>
        <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide" id="categoriesContainer"></div>
    </section>

    <!-- Dishes Grid -->
    <div id="dishesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
    <div id="noResults" class="hidden empty-state"><i class="fas fa-search text-4xl text-gray-300 mb-3"></i><p>لا توجد أطباق</p></div>
    <div id="loadingIndicator" class="loading-spinner"><i class="fas fa-spinner fa-pulse"></i> جاري تحميل القائمة...</div>
</main>

<!-- Bottom Navigation Mobile -->
<div class="bottom-nav">
    <button onclick="window.scrollTo({top:0,behavior:'smooth'})"><i class="fas fa-home"></i><span>الرئيسية</span></button>
    <button onclick="document.getElementById('categoriesContainer').scrollIntoView({behavior:'smooth'})"><i class="fas fa-utensils"></i><span>القائمة</span></button>
    <button onclick="App.toggleCart()"><i class="fas fa-receipt"></i><span>طلباتي</span><span id="navCartBadge" class="cart-badge hidden" style="position:relative;top:-12px;right:-8px;">0</span></button>
</div>

<!-- Cart Drawer -->
<div id="cartDrawer" class="cart-drawer">
    <div class="modal-overlay" onclick="App.toggleCart()"></div>
    <div class="cart-drawer__panel">
        <div class="p-5 border-b flex justify-between items-center">
            <div class="flex items-center gap-2"><i class="fas fa-shopping-cart text-[var(--color-primary)] text-xl"></i><h2 class="text-xl font-bold">سلة الطلبات</h2><span id="cartItemCount" class="text-sm text-gray-500 mr-2">0 أصناف</span></div>
            <button onclick="App.toggleCart()" class="p-2 rounded-full hover:bg-gray-100"><i class="fas fa-times"></i></button>
        </div>
        <div class="flex-1 overflow-y-auto p-4" id="cartItemsContainer"></div>
        <div class="border-t p-5 bg-white" id="cartFooter"></div>
    </div>
</div>

<!-- Success Modal -->
<div id="successModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
    <div class="bg-white rounded-2xl p-6 max-w-sm w-full text-center">
        <div class="w-16 h-16 mx-auto bg-green-100 rounded-full flex items-center justify-center mb-4"><i class="fas fa-check text-3xl text-green-600"></i></div>
        <h3 class="text-xl font-bold mb-2">تم إرسال الطلب!</h3>
        <p class="text-gray-500 text-sm mb-4">سيتم تحويلك إلى واتساب لتأكيد التفاصيل.</p>
        <div id="invoicePreview" class="bg-gray-50 p-3 rounded-lg text-right text-sm mb-4 max-h-40 overflow-auto"></div>
        <button onclick="App.closeSuccessModal()" class="btn btn-primary w-full">إغلاق</button>
    </div>
</div>

<script>
    // ================ تحميل البيانات من ملف JSON ================
    // يمكنك تعديل مسار ملف JSON حسب هيكل موقعك (مثلاً: "data/menu.json" أو "menu.json")
    const DATA_URL = "menu.json";  

    let categoriesData = [];      // سيتم ملؤها من JSON
    let dishesData = [];          // سيتم ملؤها من JSON
    let appInitialized = false;

    // State
    let cart = [];
    let currentCategory = "all";  // سيتم ضبطها بعد تحميل البيانات
    let searchTerm = "";
    let orderType = "pickup";
    let deliveryLocation = "";

    // دوال مساعدة
    function showToast(msg, type = "success") {
        const container = document.getElementById("toastContainer");
        const toast = document.createElement("div");
        toast.className = `toast toast-${type}`;
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>${msg}`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    function formatPrice(p) { return p + " ر.س"; }
    function getCartTotal() { return cart.reduce((s, i) => s + (i.price * i.quantity), 0); }
    function getCartCount() { return cart.reduce((s, i) => s + i.quantity, 0); }

    function getFilteredDishes() {
        let filtered = dishesData;
        if (currentCategory !== "all") filtered = filtered.filter(d => d.category === currentCategory);
        if (searchTerm) filtered = filtered.filter(d => d.name.includes(searchTerm) || d.description.includes(searchTerm));
        return filtered;
    }

    // دوال العرض (ستُستدعى بعد تحميل البيانات)
    function renderCategories() {
        const container = document.getElementById("categoriesContainer");
        if (!container) return;
        const allDishesCount = dishesData.length;
        container.innerHTML = `<button class="category-btn ${currentCategory === 'all' ? 'active' : ''}" onclick="App.filterByCategory('all')"><i class="fas fa-th-large"></i> الكل (${allDishesCount})</button>` +
            categoriesData.map(cat => `<button class="category-btn ${currentCategory === cat.id ? 'active' : ''}" onclick="App.filterByCategory('${cat.id}')"><i class="fas ${cat.icon}"></i> ${cat.name} (${cat.count})</button>`).join('');
    }

    function renderDishes() {
        const grid = document.getElementById("dishesGrid");
        const noResult = document.getElementById("noResults");
        if (!grid) return;
        const filtered = getFilteredDishes();
        if (filtered.length === 0) {
            grid.innerHTML = "";
            noResult.classList.remove("hidden");
            return;
        }
        noResult.classList.add("hidden");
        grid.innerHTML = filtered.map(dish => {
            const inCart = cart.find(i => i.id === dish.id);
            return `
                <div class="dish-card">
                    <div class="relative h-48 overflow-hidden">
                        <img src="${dish.image}" class="w-full h-full object-cover" loading="lazy" onerror="this.src='https://placehold.co/400x300?text=🍽️'">
                        ${dish.popular ? '<span class="absolute top-3 left-3 badge-tag badge-popular"><i class="fas fa-fire"></i> الأكثر طلباً</span>' : ''}
                    </div>
                    <div class="p-4">
                        <h3 class="font-bold text-lg">${dish.name}</h3>
                        <p class="text-sm text-gray-500 line-clamp-2 my-2">${dish.description}</p>
                        <div class="flex justify-between items-center pt-3 border-t">
                            <span class="price text-xl">${dish.price} <span class="text-sm">ر.س</span></span>
                            <button onclick="App.addToCart(${dish.id})" class="btn ${inCart ? 'btn-primary' : 'btn-secondary'} btn-sm">
                                <i class="fas ${inCart ? 'fa-check' : 'fa-plus'}"></i> ${inCart ? `في السلة (${inCart.quantity})` : 'إضافة'}
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderCartUI() {
        const container = document.getElementById("cartItemsContainer");
        const footer = document.getElementById("cartFooter");
        const countSpan = document.getElementById("cartItemCount");
        const totalItems = getCartCount();
        if (countSpan) countSpan.innerText = `${totalItems} أصناف`;

        if (cart.length === 0) {
            if (container) container.innerHTML = `<div class="empty-state"><i class="fas fa-shopping-basket text-5xl text-gray-300 mb-3"></i><p>السلة فارغة</p><button onclick="App.toggleCart()" class="btn btn-primary btn-sm mt-3">تصفح القائمة</button></div>`;
            if (footer) footer.innerHTML = "";
            updateBadges();
            return;
        }

        if (container) {
            container.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <img src="${item.image}" class="w-16 h-16 rounded-lg object-cover" onerror="this.src='https://placehold.co/64x64?text=🍽️'">
                    <div class="flex-1">
                        <div class="flex justify-between"><span class="font-bold">${item.name}</span><span class="price">${formatPrice(item.price * item.quantity)}</span></div>
                        <div class="flex justify-between items-center mt-2">
                            <div class="qty-control">
                                <button onclick="App.updateQuantity(${item.id}, -1)">-</button>
                                <span class="px-2">${item.quantity}</span>
                                <button onclick="App.updateQuantity(${item.id}, 1)">+</button>
                            </div>
                            <button onclick="App.removeFromCart(${item.id})" class="text-red-500 text-sm"><i class="fas fa-trash-alt"></i> حذف</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        const subtotal = getCartTotal();
        let deliveryFee = 0;
        if (orderType === "delivery") deliveryFee = 10;
        const finalTotal = subtotal + deliveryFee;

        if (footer) {
            footer.innerHTML = `
                <div class="mb-5 p-3 bg-[var(--color-primary-lighter)] rounded-xl">
                    <div class="font-bold mb-2">طريقة الاستلام</div>
                    <div class="flex gap-3 mb-4">
                        <button onclick="App.setOrderTypeInCart('pickup')" class="flex-1 py-3 rounded-xl border ${orderType === 'pickup' ? 'bg-[var(--color-primary)] text-white border-[var(--color-primary)]' : 'bg-white border-gray-300'}">
                            <i class="fas fa-store"></i> استلام من الفرع
                        </button>
                        <button onclick="App.setOrderTypeInCart('delivery')" class="flex-1 py-3 rounded-xl border ${orderType === 'delivery' ? 'bg-[var(--color-primary)] text-white border-[var(--color-primary)]' : 'bg-white border-gray-300'}">
                            <i class="fas fa-truck"></i> توصيل للمنزل
                        </button>
                    </div>
                    ${orderType === 'delivery' ? `
                        <div class="mb-3">
                            <label class="block text-sm font-medium mb-1">📍 العنوان أو المنطقة</label>
                            <div class="location-input-group">
                                <input type="text" id="deliveryAddressInput" placeholder="مثال: حي الورود، شارع الأمير..." value="${deliveryLocation.replace(/"/g, '&quot;')}" class="flex-1">
                                <button onclick="App.shareLocation()" class="share-location-btn" type="button"><i class="fas fa-map-marker-alt"></i> مشاركة الموقع</button>
                            </div>
                            <p class="text-xs text-gray-400 mt-1">يمكنك كتابة المنطقة يدوياً أو استخدام مشاركة الموقع</p>
                        </div>
                    ` : ''}
                    <div class="flex justify-between text-sm mt-3"><span>المجموع</span><span>${formatPrice(subtotal)}</span></div>
                    ${orderType === 'delivery' ? `<div class="flex justify-between text-sm"><span>رسوم التوصيل</span><span>${formatPrice(deliveryFee)}</span></div>` : ''}
                    <div class="flex justify-between font-bold text-lg pt-2 border-t mt-2"><span>الإجمالي</span><span class="price">${formatPrice(finalTotal)}</span></div>
                </div>
                <textarea id="orderComments" rows="2" class="w-full p-3 rounded-xl border border-gray-200 mb-4" placeholder="ملاحظات إضافية (بدون بصل، إلخ)..."></textarea>
                <button onclick="App.checkout()" class="btn btn-primary btn-block"><i class="fab fa-whatsapp"></i> تأكيد الطلب عبر واتساب</button>
            `;
        }

        if (orderType === "delivery") {
            const addrInput = document.getElementById("deliveryAddressInput");
            if (addrInput) addrInput.addEventListener("input", (e) => { deliveryLocation = e.target.value; });
        }
        updateBadges();
    }

    function updateBadges() {
        const count = getCartCount();
        const badge = document.getElementById("cartBadge");
        const navBadge = document.getElementById("navCartBadge");
        if (count > 0) {
            if (badge) { badge.innerText = count; badge.classList.remove("hidden"); }
            if (navBadge) { navBadge.innerText = count; navBadge.classList.remove("hidden"); }
        } else {
            if (badge) badge.classList.add("hidden");
            if (navBadge) navBadge.classList.add("hidden");
        }
    }

    // ================ تهيئة التطبيق بعد تحميل JSON ================
    async function loadMenuData() {
        const loadingDiv = document.getElementById("loadingIndicator");
        try {
            const response = await fetch(DATA_URL);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            // نتوقع أن الملف JSON يحتوي على key "categories" و "dishes"
            if (!data.categories || !data.dishes) throw new Error("JSON يجب أن يحتوي على خاصيتي categories و dishes");
            categoriesData = data.categories;
            dishesData = data.dishes;

            // تحديث عدد الأطباق في كل فئة (count)
            categoriesData.forEach(cat => {
                cat.count = dishesData.filter(d => d.category === cat.id).length;
            });

            // إخفاء مؤشر التحميل
            if (loadingDiv) loadingDiv.classList.add("hidden");
            appInitialized = true;

            // بدء التطبيق
            currentCategory = "all";
            renderCategories();
            renderDishes();
            renderCartUI();
            updateBadges();

            // إضافة مستمع البحث
            const searchInput = document.getElementById("searchInput");
            if (searchInput) {
                searchInput.addEventListener("input", (e) => {
                    searchTerm = e.target.value.trim();
                    const clearBtn = document.getElementById("searchClear");
                    if (clearBtn) clearBtn.classList.toggle("hidden", !searchTerm);
                    renderDishes();
                });
            }
        } catch (err) {
            console.error("خطأ في تحميل menu.json:", err);
            if (loadingDiv) {
                loadingDiv.innerHTML = `<div class="text-center text-red-600"><i class="fas fa-exclamation-triangle"></i> فشل تحميل القائمة: ${err.message}<br>تأكد من وجود ملف menu.json في نفس المجلد واتباع البنية الصحيحة.</div>`;
            }
            showToast("حدث خطأ في تحميل البيانات. راجع وحدة التحكم", "error");
        }
    }

    // ================ كائن التطبيق (يتم ربطه بعد تحميل البيانات) ================
    const App = {
        filterByCategory(catId) {
            if (!appInitialized) return;
            currentCategory = catId;
            renderCategories();
            renderDishes();
        },
        clearSearch() {
            const inp = document.getElementById("searchInput");
            if (inp) inp.value = "";
            searchTerm = "";
            const clearBtn = document.getElementById("searchClear");
            if (clearBtn) clearBtn.classList.add("hidden");
            renderDishes();
        },
        addToCart(dishId) {
            if (!appInitialized) return;
            const dish = dishesData.find(d => d.id === dishId);
            if (!dish) return;
            const existing = cart.find(i => i.id === dishId);
            if (existing) existing.quantity++;
            else cart.push({ ...dish, quantity: 1 });
            renderDishes();
            renderCartUI();
            showToast(`✅ تمت إضافة ${dish.name}`);
        },
        removeFromCart(dishId) {
            const item = cart.find(i => i.id === dishId);
            if (!item) return;
            cart = cart.filter(i => i.id !== dishId);
            renderDishes();
            renderCartUI();
            showToast(`🗑️ تم حذف ${item.name}`, "error");
        },
        updateQuantity(dishId, delta) {
            const item = cart.find(i => i.id === dishId);
            if (!item) return;
            item.quantity += delta;
            if (item.quantity <= 0) this.removeFromCart(dishId);
            else { renderDishes(); renderCartUI(); }
        },
        toggleCart() {
            const drawer = document.getElementById("cartDrawer");
            const isOpen = drawer.classList.contains("open");
            if (isOpen) { drawer.classList.remove("open"); document.body.style.overflow = ""; }
            else { drawer.classList.add("open"); document.body.style.overflow = "hidden"; renderCartUI(); }
        },
        setOrderTypeInCart(type) {
            orderType = type;
            if (type === "pickup") deliveryLocation = "";
            renderCartUI();
        },
        shareLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const url = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    deliveryLocation = url;
                    const inp = document.getElementById("deliveryAddressInput");
                    if (inp) inp.value = url;
                    showToast("تم تحديث الموقع", "success");
                }, () => showToast("فشل تحديد الموقع", "error"));
            } else showToast("المتصفح لا يدعم مشاركة الموقع", "error");
        },
        checkout() {
            if (!appInitialized) return;
            if (cart.length === 0) return;
            if (orderType === "delivery" && !deliveryLocation) { showToast("⚠️ يرجى إدخال المنطقة أو مشاركة الموقع", "error"); return; }
            const subtotal = getCartTotal();
            const deliveryFee = orderType === "delivery" ? 10 : 0;
            const total = subtotal + deliveryFee;
            const comments = document.getElementById("orderComments")?.value || "";
            const locationText = orderType === "pickup" ? "استلام من الفرع" : deliveryLocation;
            let invoice = `<div class="border-b pb-2 mb-2">#${Date.now().toString().slice(-6)}</div>`;
            cart.forEach(i => invoice += `<div class="flex justify-between">${i.name} × ${i.quantity} <span>${formatPrice(i.price * i.quantity)}</span></div>`);
            if (deliveryFee > 0) invoice += `<div class="flex justify-between">رسوم التوصيل <span>${formatPrice(deliveryFee)}</span></div>`;
            invoice += `<div class="flex justify-between font-bold mt-2 pt-2 border-t"><span>الإجمالي</span><span>${formatPrice(total)}</span></div>`;
            if (orderType === "delivery") invoice += `<div class="text-xs mt-2 break-words">📍 الموقع: ${locationText}</div>`;
            if (comments) invoice += `<div class="text-xs mt-1">📝 ${comments}</div>`;
            document.getElementById("invoicePreview").innerHTML = invoice;
            document.getElementById("successModal").style.display = "flex";
            this.toggleCart();
            
            let msg = `🍽️ *طلب جديد من ليالي أبهى*%0A📋 #${Date.now().toString().slice(-6)}%0A📅 ${new Date().toLocaleDateString('ar-SA')}%0A%0A`;
            cart.forEach(i => msg += `- ${i.name} × ${i.quantity} = ${formatPrice(i.price * i.quantity)}%0A`);
            msg += `%0A💰 *الإجمالي: ${formatPrice(total)}*%0A`;
            msg += `🚚 ${orderType === "pickup" ? "استلام من الفرع" : "توصيل للمنزل"}%0A`;
            if (orderType === "delivery") msg += `📍 العنوان: ${deliveryLocation}%0A`;
            if (comments) msg += `📝 ملاحظات: ${comments}%0A`;
            
            setTimeout(() => {
                window.open(`https://wa.me/967737127316?text=${msg}`, "_blank");
                cart = [];
                orderType = "pickup";
                deliveryLocation = "";
                renderDishes(); renderCartUI(); updateBadges();
            }, 1500);
        },
        closeSuccessModal() { document.getElementById("successModal").style.display = "none"; }
    };

    window.App = App;
    // بدء تحميل البيانات
    loadMenuData();
</script>
</body>
</html>
